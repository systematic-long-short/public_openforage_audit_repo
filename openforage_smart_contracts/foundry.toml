[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
fuzz = { runs = 10000 }
invariant = { runs = 1000, depth = 200 }
ffi = true
# Read-only filesystem access for the defence-in-depth traceability test
# (test/audit/DefenceInDepthTraceability.t.sol uses vm.readFile to assert
# every R-1..R-41 row in documentation/smart_contract_audits/defence_in_depth.md
# has a live source/runbook anchor).
fs_permissions = [
    { access = "read", path = "./src" },
    { access = "read", path = "./test" },
    { access = "read", path = "./script" },
    { access = "read", path = "./.semgrep" },
    { access = "read", path = "./Makefile" },
    { access = "read", path = "./slither.config.json" },
    { access = "read", path = "./slither_suppressions.json" },
    { access = "read", path = "./echidna.yaml" },
    { access = "read", path = "./halmos.toml" },
    { access = "read", path = "./simplify_waivers.json" },
    { access = "read", path = "../documentation" },
    { access = "read", path = "../plans" },
    { access = "read-write", path = "./deployments" },
]

# HyperLiquid integration high-depth test profile per L3 plan section 'Tooling'.
# Invariant runs: 256 independent runs, 10000 calls per run (TC-IV-01..04).
# Fuzz runs: 10000 per TC-F-01..04 (inherits default).
[profile.hyperliquid]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
fuzz = { runs = 10000 }
invariant = { runs = 256, depth = 10000 }

[profile.deploy]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 0
via_ir = true
revert_strings = "strip"
bytecode_hash = "none"
fuzz = { runs = 10000 }
invariant = { runs = 1000, depth = 200 }

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
